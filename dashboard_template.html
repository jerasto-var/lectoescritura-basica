<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Entrenamiento de Lectura</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    
    <script src="words.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; padding: 10px; margin: 0; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; font-size: 1.5rem; margin-bottom: 20px; }
        
        /* Grid de récords adaptable a móvil */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 10px; margin-bottom: 25px; }
        .stat-card { background: #e8f0fe; padding: 12px; border-radius: 12px; border: 1px solid #c2d7ff; }
        .stat-label { font-size: 11px; color: #5f6368; text-transform: uppercase; font-weight: bold; }
        .stat-value { font-size: 24px; font-weight: bold; color: #1967d2; margin: 5px 0; }
        
        /* Contenedores de gráficas */
        .chart-container { margin-bottom: 40px; padding: 15px; border: 1px solid #eee; border-radius: 10px; background: #fff; }
        h3 { color: #444; font-size: 1.1rem; margin-bottom: 10px; border-bottom: 2px solid #1a73e8; display: inline-block; padding-bottom: 3px; }
        .canvas-wrapper { height: 250px; position: relative; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Mi Progreso de Lectura</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Copiado</div>
                <div id="max-copiado" class="stat-value">0</div>
                <div class="stat-label">PPM</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Lectura</div>
                <div id="max-lectura" class="stat-value">0</div>
                <div class="stat-label">PPM</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Dictado</div>
                <div id="max-dictado" class="stat-value">0</div>
                <div class="stat-label">PPM</div>
            </div>
        </div>

        <div class="chart-container">
            <h3>📈 Evolución: Copiado</h3>
            <div class="canvas-wrapper"><canvas id="chartCopiado"></canvas></div>
        </div>

        <div class="chart-container">
            <h3>📖 Evolución: Lectura</h3>
            <div class="canvas-wrapper"><canvas id="chartLectura"></canvas></div>
        </div>

        <div class="chart-container">
            <h3>✍️ Evolución: Dictado</h3>
            <div class="canvas-wrapper"><canvas id="chartDictado"></canvas></div>
        </div>
    </div>

    <script>
        const public_spreadsheet_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSPbpiuL-TNp1FOm6n8BoeQcEKTyCMcvsugt1K2t2sUtaAnjY83A7ZuunEbRRyhp0GtiqqSHJQDLNNX/pub?gid=407824740&single=true&output=csv';

        const configTipos = {
            'Copiado': { color: '#1a73e8', canvasId: 'chartCopiado', cardId: 'max-copiado' },
            'Lectura': { color: '#34a853', canvasId: 'chartLectura', cardId: 'max-lectura' },
            'Dictado': { color: '#f9ab00', canvasId: 'chartDictado', cardId: 'max-dictado' }
        };

        function init() {
            Papa.parse(public_spreadsheet_url, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    procesarDatos(results.data);
                }
            });
        }

        function procesarDatos(data) {
            const datasets = { 'Copiado': [], 'Lectura': [], 'Dictado': [] };

            data.forEach(row => {
                const tipo = row['Tipo de prueba'] ? row['Tipo de prueba'].trim() : null;
                if (!datasets[tipo]) return;

                // Formatear etiqueta de fecha (Mes-Día)
                let etiquetaFecha = "S/F";
                if (row['Marca temporal']) {
                    const partesFecha = row['Marca temporal'].split(' ')[0].split('/');
                    if (partesFecha.length >= 2) {
                        const dia = partesFecha[0].padStart(2, '0');
                        const mes = partesFecha[1].padStart(2, '0');
                        etiquetaFecha = `${mes}-${dia}`; 
                    }
                }

                // Cálculo de PPM
                const idLeccion = row['Lección'].trim().replace(/ /g, "_").toLowerCase();
                const leccionKey = Object.keys(leccionesData).find(k => k.toLowerCase() === idLeccion);
                const conteos = leccionesData[leccionKey];
                const palabras = (conteos && conteos[tipo]) ? conteos[tipo] : 0;

                const min = parseFloat(row['Minutos']) || 0;
                const seg = parseFloat(row['Segundos']) || 0;
                const tiempoTotal = min + (seg / 60);
                const ppm = tiempoTotal > 0 ? parseFloat((palabras / tiempoTotal).toFixed(2)) : 0;

                datasets[tipo].push({
                    fecha: etiquetaFecha,
                    leccion: row['Lección'],
                    ppm: ppm
                });
            });

            // Actualizar UI y Gráficas
            Object.keys(configTipos).forEach(tipo => {
                const info = configTipos[tipo];
                const dataTipo = datasets[tipo];

                const labels = dataTipo.map(d => d.fecha);
                const values = dataTipo.map(d => d.ppm);
                const nombres = dataTipo.map(d => d.leccion);

                const maxVal = values.length > 0 ? Math.max(...values) : 0;
                document.getElementById(info.cardId).innerText = maxVal;

                renderChart(info.canvasId, tipo, labels, values, info.color, nombres);
            });
        }

        function renderChart(canvasId, label, labels, values, color, nombresLecciones) {
            const ctx = document.getElementById(canvasId).getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: `PPM`,
                        data: values,
                        borderColor: color,
                        backgroundColor: color + '1A',
                        borderWidth: 2,
                        pointBackgroundColor: color,
                        pointRadius: 3,
                        fill: true,
                        tension: 0.3
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        tooltip: {
                            callbacks: {
                                label: function(context) {
                                    return ` Velocidad: ${context.parsed.y} PPM`;
                                },
                                afterLabel: function(context) {
                                    return `Lección: ${nombresLecciones[context.dataIndex]}`;
                                }
                            }
                        }
                    },
                    scales: { 
                        y: { beginAtZero: true, title: { display: false } },
                        x: { ticks: { font: { size: 10 } } }
                    }
                }
            });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
