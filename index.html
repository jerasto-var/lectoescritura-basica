<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Panel de Control - Entrenamiento de Lectura</title>
    <script src="[https://cdn.jsdelivr.net/npm/chart.js](https://cdn.jsdelivr.net/npm/chart.js)"></script>
    <script src="[https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js](https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js)"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; text-align: center; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #1a73e8; }
        .stats-grid { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .stat-card { background: #e8f0fe; padding: 15px; border-radius: 10px; width: 30%; }
        .stat-value { font-size: 24px; font-weight: bold; color: #1967d2; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 ¡Progreso de Misión!</h1>
        
        <div class="stats-grid">
            <div class="stat-card">
                <div>Mejor Récord</div>
                <div id="max-ppm" class="stat-value">0</div>
                <div>PPM</div>
            </div>
            <div class="stat-card">
                <div>Lecciones</div>
                <div id="total-lecciones" class="stat-value">0</div>
                <div>Completadas</div>
            </div>
        </div>

        <canvas id="progresoChart"></canvas>
    </div>

    <script>
        // REEMPLAZA ESTA URL CON TU URL DE GOOGLE SHEET (CSV)
        const public_spreadsheet_url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSPbpiuL-TNp1FOm6n8BoeQcEKTyCMcvsugt1K2t2sUtaAnjY83A7ZuunEbRRyhp0GtiqqSHJQDLNNX/pub?gid=407824740&single=true&output=csv';

        function init() {
            Papa.parse(public_spreadsheet_url, {
                download: true,
                header: true,
                complete: function(results) {
                    const datos = results.data;
                    procesarDatos(datos);
                }
            });
        }

        function procesarDatos(data) {
            // Filtrar filas con datos mínimos
            const cleanData = data.filter(row => row['Lección'] && row['Minutos']);

            const etiquetas = cleanData.map(row => row['Lección'] + " (" + row['Tipo de prueba'] + ")");
            
            const valoresPPM = cleanData.map(row => {
                // El QR envía "Ballena_Azul", buscamos ese ID en words.js
                const idLeccion = row['Lección'].trim().replace(/ /g, "_");
                const tipoActividad = row['Tipo de prueba'].trim(); // "Copiado", "Lectura" o "Dictado"
                
                // Obtenemos el conteo de palabras automático de GitHub
                const palabras = (leccionesData[idLeccion] && leccionesData[idLeccion][tipoActividad]) 
                                 ? leccionesData[idLeccion][tipoActividad] 
                                 : 0;
                
                const min = parseFloat(row['Minutos']) || 0;
                const seg = parseFloat(row['Segundos']) || 0;
                const tiempoTotal = min + (seg / 60);

                return tiempoTotal > 0 ? (palabras / tiempoTotal).toFixed(2) : 0;
            });
            
            // Actualizar Tarjetas
            document.getElementById('max-ppm').innerText = Math.max(...valoresPPM);
            document.getElementById('total-lecciones').innerText = cleanData.length;

            // Renderizar Gráfica
            renderChart(etiquetas, valoresPPM);
        }

        function renderChart(labels, values) {
            const ctx = document.getElementById('progresoChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Velocidad (Palabras por Minuto)',
                        data: values,
                        borderColor: '#1a73e8',
                        backgroundColor: 'rgba(26, 115, 232, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    scales: { y: { beginAtZero: true, title: { display: true, text: 'PPM' } } }
                }
            });
        }
        

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html><div style='max-width:800px; margin:20px auto; font-family:sans-serif; padding:20px; border-top:1px dashed #ccc;'>
